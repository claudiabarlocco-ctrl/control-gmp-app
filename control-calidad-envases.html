<html lang="es">

        .export-multiple { background: #805ad5; color: white; }
        .export-multiple:hover { background: #6b46c1; }
        .btn-export { background: #38a169; color: white; }
        .btn-export:hover { background: #2f855a; }
        .btn-print { background: #3182ce; color: white; }
        .btn-print:hover { background: #2c5282; }
        .dias-activa {
            display: inline-block; padding: 4px 8px; background: #fef5e7;
            color: #744210; border-radius: 4px; font-size: 12px; font-weight: 600; margin-left: 10px;

        .dias-activa.warning { background: #fed7d7; color: #742a2a; }
        .separator {
            height: 2px; background: linear-gradient(to right, transparent, #e2e8f0, transparent);
            margin: 30px 0;
        }
        @media (max-width: 768px) {
            .tipo-control-selector { grid-template-columns: 1fr; }
        }

            const [activeTab, setActiveTab] = useState('soplado');
            const [ordenesSoplado, setOrdenesSoplado] = useState([]);
            const [controlesLCC, setControlesLCC] = useState([]);
            const [mensaje, setMensaje] = useState(null);
            
            // Estados Órdenes Soplado
            const [mostrarNuevaOrden, setMostrarNuevaOrden] = useState(false);
            const [nuevaOrdenData, setNuevaOrdenData] = useState({
                numeroOrden: '', envase: '', fecha: new Date().toISOString().split('T')[0],
                operador: '', turno: ''
            });
            const [tipoControlSoplado, setTipoControlSoplado] = useState('');
            const [ordenSeleccionada, setOrdenSeleccionada] = useState(null);
            const [mostrarSeleccionOrden, setMostrarSeleccionOrden] = useState(false);
            
            // Estados Controles LCC
            const [mostrarNuevoLCC, setMostrarNuevoLCC] = useState(false);
            const [tipoControlLCC, setTipoControlLCC] = useState('');
            const [nuevoControlLCC, setNuevoControlLCC] = useState({
                envase: '', fecha: new Date().toISOString().split('T')[0],
                operador: '', turno: ''
            });
            
            // Estados comunes
            const [hora, setHora] = useState('');
            const [mediciones, setMediciones] = useState({});
            const [observaciones, setObservaciones] = useState('');
            const [controlDetalle, setControlDetalle] = useState(null);
            const [filtroEnvase, setFiltroEnvase] = useState('');
            const [filtroEstado, setFiltroEstado] = useState('todas');
            const [busqueda, setBusqueda] = useState('');
            const [mostrarAlertasOOS, setMostrarAlertasOOS] = useState(false);

            useEffect(() => {
                const storedOrdenes = localStorage.getItem('ordenes_soplado');
                const storedLCC = localStorage.getItem('controles_lcc');
                if (storedOrdenes) setOrdenesSoplado(JSON.parse(storedOrdenes));
                if (storedLCC) setControlesLCC(JSON.parse(storedLCC));
            }, []);

            const guardarOrdenes = (nuevasOrdenes) => {
                localStorage.setItem('ordenes_soplado', JSON.stringify(nuevasOrdenes));
                setOrdenesSoplado(nuevasOrdenes);
            };

            const guardarControlesLCC = (nuevosControles) => {
                localStorage.setItem('controles_lcc', JSON.stringify(nuevosControles));
                setControlesLCC(nuevosControles);
            };

            const crearNuevaOrden = () => {
                if (!nuevaOrdenData.numeroOrden || !nuevaOrdenData.envase || !nuevaOrdenData.operador) {
                    setMensaje({ tipo: 'warning', texto: 'Complete todos los campos obligatorios' });
                    return;
                }
                const nuevaOrden = {
                    id: Date.now(), ...nuevaOrdenData, estado: 'activa', controles: [],
                    createdAt: new Date().toISOString()
                };
                guardarOrdenes([nuevaOrden, ...ordenesSoplado]);
                setMensaje({ tipo: 'success', texto: `✓ Orden ${nuevaOrdenData.numeroOrden} creada` });
                setMostrarNuevaOrden(false);
                setNuevaOrdenData({
                    numeroOrden: '', envase: '', fecha: new Date().toISOString().split('T')[0],
                    operador: '', turno: ''
                });
            };

            const registrarControlSoplado = () => {
                if (!ordenSeleccionada) {
                    setMensaje({ tipo: 'warning', texto: 'Seleccione una orden' });
                    return;
                }
                if (tipoControlSoplado === 'proceso' && !hora) {
                    setMensaje({ tipo: 'warning', texto: 'Ingrese la hora' });
                    return;
                }
                const nuevoControl = {
                    id: Date.now(), tipo: tipoControlSoplado,
                    fecha: new Date().toISOString().split('T')[0],

                                            </div>

                                            <div className="button-group">
                                                <button className="btn btn-secondary" onClick={() => {
                                                    setMostrarNuevoLCC(false);
                                                    setTipoControlLCC('');
                                                }}>
                                                    ← Volver
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {tipoControlLCC && (() => {
                                        const numMuestras = tipoControlLCC === 'semanal' ? 3 : 10;
                                        const spec = nuevoControlLCC.envase ? ESPECIFICACIONES[nuevoControlLCC.envase] : null;
                                        
                                        return (
                                            <div className="form-section">
                                                <h2 className="section-title">
                                                    {tipoControlLCC === 'validacion' ? '🔬 Validación de Envases (REG-A)' :
                                                     tipoControlLCC === 'quincenal' ? '📅 Control Quincenal LCC (REG-C)' :
                                                     '📆 Control Semanal LCC (REG-H)'}
                                                </h2>

                                                <div className="form-grid">
                                                    <div className="form-group">
                                                        <label>Envase *</label>
                                                        <select value={nuevoControlLCC.envase}
                                                            onChange={(e) => setNuevoControlLCC({...nuevoControlLCC, envase: e.target.value})}>
                                                            <option value="">Seleccione...</option>
                                                            {Object.entries(ESPECIFICACIONES).map(([key, val]) => (
                                                                <option key={key} value={key}>{val.nombre}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div className="form-group">
                                                        <label>Fecha</label>
                                                        <input type="date" value={nuevoControlLCC.fecha}
                                                            onChange={(e) => setNuevoControlLCC({...nuevoControlLCC, fecha: e.target.value})} />
                                                    </div>
                                                    <div className="form-group">
                                                        <label>Operador *</label>
                                                        <input type="text" value={nuevoControlLCC.operador}
                                                            onChange={(e) => setNuevoControlLCC({...nuevoControlLCC, operador: e.target.value})} />
                                                    </div>
                                                    <div className="form-group">
                                                        <label>Turno</label>
                                                        <select value={nuevoControlLCC.turno}
                                                            onChange={(e) => setNuevoControlLCC({...nuevoControlLCC, turno: e.target.value})}>
                                                            <option value="">Seleccione...</option>
                                                            <option value="mañana">Mañana</option>
                                                            <option value="tarde">Tarde</option>
                                                            <option value="noche">Noche</option>
                                                        </select>
                                                    </div>
                                                </div>

                                                <div className="alert alert-info">
                                                    <strong>Muestras requeridas:</strong> {numMuestras} por cavidad | 
                                                    <strong> Parámetros:</strong> Dimensionales completos
                                                </div>

                                                {/* Tabla de Mediciones Dimensionales */}
                                                {spec && (
                                                    <div className="measurement-table">
                                                        <h3 style={{marginBottom: '15px', color: '#2d3748'}}>
                                                            Mediciones Dimensionales - {numMuestras} muestras por cavidad
                                                        </h3>
                                                        <table>
                                                            <thead>
                                                                <tr>
                                                                    <th style={{width: '150px'}}>Parámetro</th>
                                                                    <th style={{width: '80px'}}>Cavidad</th>
                                                                    <th style={{width: '100px'}}>Especificación</th>
                                                                    {[...Array(numMuestras)].map((_, i) => (
                                                                        <th key={i} style={{width: '70px'}}>M{i+1}</th>
                                                                    ))}
                                                                    <th style={{width: '70px'}}>Promedio</th>
                                                                    <th style={{width: '70px'}}>Mín</th>
                                                                    <th style={{width: '70px'}}>Máx</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {/* Iterar sobre cada parámetro dimensional */}
                                                                {['brimful', 'altura_h', 'ancho_pie_hw', 'profundidad_pie_hd', 'ancho_hombro_sw', 'profundidad_hombro_sd'].map(param => {
                                                                    if (!spec.parametros[param]) return null;
                                                                    
                                                                    return [1, 2].map(cav => {
                                                                        const key = `${tipoControlLCC}_${param}_cav${cav}`;
                                                                        const valores = mediciones[key] || Array(numMuestras).fill('');
                                                                        
                                                                        // Cálculos automáticos
                                                                        const nums = valores.filter(v => v && !isNaN(parseFloat(v))).map(v => parseFloat(v));
                                                                        const promedio = nums.length > 0 ? (nums.reduce((a,b) => a+b, 0) / nums.length).toFixed(2) : '-';
                                                                        const minVal = nums.length > 0 ? Math.min(...nums).toFixed(2) : '-';
                                                                        const maxVal = nums.length > 0 ? Math.max(...nums).toFixed(2) : '-';
                                                                        
                                                                        // Validación OOS
                                                                        const esOOS = nums.some(v => v < spec.parametros[param].min || v > spec.parametros[param].max);
                                                                        
                                                                        return (
                                                                            <tr key={`${param}_cav${cav}`}>
                                                                                {cav === 1 && (
                                                                                    <td rowSpan="2" style={{fontWeight: 'bold', background: '#f7fafc'}}>
                                                                                        {spec.parametros[param].nombre}
                                                                                    </td>
                                                                                )}
                                                                                <td style={{fontWeight: 'bold'}}>Cav {cav}</td>
                                                                                <td style={{fontSize: '11px', color: '#718096'}}>
                                                                                    {spec.parametros[param].min} - {spec.parametros[param].max} {spec.parametros[param].unidad}
                                                                                </td>
                                                                                {[...Array(numMuestras)].map((_, i) => (
                                                                                    <td key={i}>
                                                                                        <input 
                                                                                            type="number"
                                                                                            step="0.1"
                                                                                            value={valores[i] || ''}
                                                                                            onChange={(e) => {
                                                                                                const newValores = [...valores];
                                                                                                newValores[i] = e.target.value;
                                                                                                setMediciones({
                                                                                                    ...mediciones,
                                                                                                    [key]: newValores
                                                                                                });
                                                                                            }}
                                                                                            style={{
                                                                                                borderColor: valores[i] && !isNaN(parseFloat(valores[i])) && 
                                                                                                    (parseFloat(valores[i]) < spec.parametros[param].min || 
                                                                                                     parseFloat(valores[i]) > spec.parametros[param].max) 
                                                                                                    ? '#e53e3e' : '#cbd5e0'
                                                                                            }}
                                                                                        />
                                                                                    </td>
                                                                                ))}
                                                                                <td style={{fontWeight: 'bold', background: esOOS ? '#fff5f5' : '#f0fff4'}}>
                                                                                    {promedio}
                                                                                </td>
                                                                                <td>{minVal}</td>
                                                                                <td>{maxVal}</td>
                                                                            </tr>
                                                                        );
                                                                    });
                                                                })}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                )}

                                                {!spec && (
                                                    <div className="alert alert-warning">
                                                        Seleccione un envase para mostrar los parámetros de medición
                                                    </div>
                                                )}

                                                <div className="form-group" style={{marginTop: '25px'}}>
                                                    <label>Observaciones</label>
                                                    <textarea value={observaciones}
                                                        onChange={(e) => setObservaciones(e.target.value)}
                                                        rows="3" 
                                                        placeholder="Detallar cualquier inconformidad o acción correctiva..." />
                                                </div>

                                                <div className="button-group">
                                                    <button className="btn btn-primary" onClick={registrarControlLCC}>
                                                        💾 Guardar Control LCC
                                                    </button>
                                                    <button className="btn btn-secondary" onClick={resetFormularios}>
                                                        Cancelar
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </>
                            )}

                            {/* TAB: HISTÓRICO */}
                            {activeTab === 'historico' && (
                                <>
                                    <div className="stats-grid">
                                        <div className="stat-card">
                                            <div className="stat-label">Órdenes Soplado</div>
                                            <div className="stat-value">{ordenesSoplado.length}</div>
                                        </div>
                                        <div className="stat-card">
                                            <div className="stat-label">Órdenes Activas</div>
                                            <div className="stat-value">{ordenesSoplado.filter(o => o.estado === 'activa').length}</div>
                                        </div>
                                        <div className="stat-card">
                                            <div className="stat-label">Controles LCC</div>
                                            <div className="stat-value">{controlesLCC.length}</div>
                                        </div>
                                        <div className="stat-card">
                                            <div className="stat-label">Total Controles</div>
                                            <div className="stat-value">
                                                {ordenesSoplado.reduce((sum, o) => sum + o.controles.length, 0) + controlesLCC.length}
                                            </div>
                                        </div>
                                    </div>

                                    {/* ÓRDENES DE SOPLADO */}
                                    <div className="form-section">
                                        <h2 className="section-title">🏭 Órdenes de Soplado</h2>
                                        {ordenesSoplado.length === 0 ? (
                                            <div className="empty-state">
                                                <div className="empty-state-icon">📦</div>
                                                <p>No hay órdenes de soplado</p>
                                            </div>
                                        ) : (
                                            ordenesSoplado.map(orden => {
                                                const spec = ESPECIFICACIONES[orden.envase];
                                                const dias = calcularDiasActiva(orden.fecha);
                                                const controlesArranque = orden.controles.filter(c => c.tipo === 'arranque');
                                                const controlesProceso = orden.controles.filter(c => c.tipo === 'proceso');

                                                return (
                                                    <div key={orden.id} className="orden-card">
                                                        <div className="orden-header">
                                                            <div className="orden-title">
                                                                📦 {orden.numeroOrden}
                                                                <span className={`status-badge ${orden.estado === 'activa' ? 'status-active' : 'status-ok'}`}
                                                                    style={{marginLeft: '10px'}}>
                                                                    {orden.estado === 'activa' ? '🟢 Activa' : '✓ Finalizada'}
                                                                </span>
                                                                {orden.estado === 'activa' && (
                                                                    <span className={`dias-activa ${dias > 3 ? 'warning' : ''}`}>
                                                                        📅 {dias} día{dias !== 1 ? 's' : ''}{dias > 3 && ' ⚠️'}
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>

                                                        <div className="orden-info">
                                                            <div className="orden-detail"><strong>Envase:</strong> {spec?.nombre}</div>
                                                            <div className="orden-detail"><strong>Fecha:</strong> {orden.fecha}</div>
                                                            <div className="orden-detail"><strong>Operador:</strong> {orden.operador}</div>
                                                            <div className="orden-detail"><strong>Controles:</strong> {orden.controles.length}</div>
                                                        </div>

                                                        {orden.controles.length > 0 && (
                                                            <div className="controles-list">
                                                                <h4 style={{marginBottom: '10px', color: '#4a5568'}}>Controles:</h4>
                                                                
                                                                {controlesArranque.map(c => (
                                                                    <div key={c.id} className="control-item arranque"
                                                                        onClick={() => setControlDetalle({control: c, orden, tipo: 'soplado'})}>
                                                                        <div className="control-info">
                                                                            <span className="control-hora">🚀 Arranque</span>
                                                                            <span className="control-tipo">{c.fecha} - {c.hora}</span>
                                                                        </div>
                                                                        <div style={{color: '#667eea', fontSize: '12px'}}>Ver →</div>
                                                                    </div>
                                                                ))}

                                                                {controlesProceso.map(c => (
                                                                    <div key={c.id} className="control-item proceso"
                                                                        onClick={() => setControlDetalle({control: c, orden, tipo: 'soplado'})}>
                                                                        <div className="control-info">
                                                                            <span className="control-hora">⏱️ {c.hora}</span>
                                                                            <span className="control-tipo">{c.fecha}</span>
                                                                        </div>
                                                                        <div style={{color: '#38a169', fontSize: '12px'}}>Ver →</div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}

                                                        <div style={{marginTop: '15px', display: 'flex', gap: '10px', flexWrap: 'wrap'}}>
                                                            <button className="btn btn-export"
                                                                onClick={() => exportarOrdenExcel(orden)}
                                                                style={{fontSize: '13px', padding: '8px 16px'}}>
                                                                📊 Excel
                                                            </button>
                                                            {orden.estado === 'activa' && (
                                                                <button className="btn btn-success"
                                                                    onClick={() => finalizarOrden(orden.id)}
                                                                    style={{fontSize: '13px', padding: '8px 16px'}}>
                                                                    ✓ Finalizar
                                                                </button>
                                                            )}
                                                            <button className="btn btn-danger"
                                                                onClick={() => eliminarOrden(orden.id)}
                                                                style={{fontSize: '13px', padding: '8px 16px'}}>
                                                                🗑️ Eliminar
                                                            </button>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>

                                    <div className="separator"></div>

                                    {/* CONTROLES LCC */}
                                    <div className="form-section">
                                        <h2 className="section-title">🔬 Controles LCC (Liberación de Cambio de Calidad)</h2>
                                        {controlesLCC.length === 0 ? (
                                            <div className="empty-state">
                                                <div className="empty-state-icon">🔬</div>
                                                <p>No hay controles LCC registrados</p>
                                            </div>
                                        ) : (
                                            controlesLCC.map(control => {
                                                const spec = ESPECIFICACIONES[control.envase];
                                                const tipoLabel = 
                                                    control.tipo === 'validacion' ? '🔬 Validación' :
                                                    control.tipo === 'quincenal' ? '📅 Quincenal' :
                                                    '📆 Semanal';
                                                const tipoClass = control.tipo;

                                                return (
                                                    <div key={control.id} className="control-card">
                                                        <div className="control-header">
                                                            <div className="control-title">
                                                                {tipoLabel} - {spec?.nombre}
                                                            </div>
                                                        </div>

                                                        <div className="control-info-grid">
                                                            <div className="orden-detail"><strong>Envase:</strong> {spec?.nombre}</div>
                                                            <div className="orden-detail"><strong>Fecha:</strong> {control.fecha}</div>
                                                            <div className="orden-detail"><strong>Hora:</strong> {control.hora}</div>
                                                            <div className="orden-detail"><strong>Operador:</strong> {control.operador}</div>
                                                            {control.turno && (
                                                                <div className="orden-detail"><strong>Turno:</strong> {control.turno}</div>
                                                            )}
                                                        </div>

                                                        {control.observaciones && (
                                                            <div style={{marginTop: '15px', padding: '10px', background: '#f7fafc', borderRadius: '6px'}}>
                                                                <strong>Observaciones:</strong> {control.observaciones}
                                                            </div>
                                                        )}

                                                        <div style={{marginTop: '15px', display: 'flex', gap: '10px'}}>
                                                            <button className="btn btn-danger"
                                                                onClick={() => eliminarControlLCC(control.id)}
                                                                style={{fontSize: '13px', padding: '8px 16px'}}>
                                                                🗑️ Eliminar
                                                            </button>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </>
                            )}

                            {/* MODAL DE DETALLES */}
                            {controlDetalle && (
                                <div className="modal-overlay" onClick={() => setControlDetalle(null)}>
                                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                        <div className="modal-header">
                                            <div className="modal-title">Detalle del Control</div>
                                            <button className="modal-close" onClick={() => setControlDetalle(null)}>✕</button>
                                        </div>
                                        <div className="modal-body">
                                            <div className="detalle-grid">
                                                {controlDetalle.tipo === 'soplado' && (
                                                    <div className="detalle-item">
                                                        <div className="detalle-label">Orden</div>
                                                        <div className="detalle-value">{controlDetalle.orden.numeroOrden}</div>
                                                    </div>
                                                )}
                                                <div className="detalle-item">
                                                    <div className="detalle-label">Tipo</div>
                                                    <div className="detalle-value">{controlDetalle.control.tipo}</div>
                                                </div>
                                                <div className="detalle-item">
                                                    <div className="detalle-label">Fecha</div>
                                                    <div className="detalle-value">{controlDetalle.control.fecha}</div>
                                                </div>
                                                <div className="detalle-item">
                                                    <div className="detalle-label">Hora</div>
                                                    <div className="detalle-value">{controlDetalle.control.hora}</div>
                                                </div>
                                            </div>
                                            {controlDetalle.control.observaciones && (
                                                <div style={{marginTop: '20px', padding: '15px', background: '#fff5f5',
                                                    borderRadius: '8px', borderLeft: '4px solid #e53e3e'}}>
                                                    <strong>Observaciones:</strong>
                                                    <p style={{marginTop: '8px'}}>{controlDetalle.control.observaciones}</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
