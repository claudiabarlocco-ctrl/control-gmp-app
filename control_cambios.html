<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Cambios · Vessena S.A.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: #ddd9d0;
    --border-strong: #b8b2a7;
    --text: #1a1916;
    --text-muted: #6b6560;
    --accent: #c8410a;
    --accent-light: #fdf0eb;
    --accent2: #1a5c3a;
    --accent2-light: #eaf4ee;
    --yellow: #f0a500;
    --yellow-light: #fef8e8;
    --blue: #1a4a7a;
    --blue-light: #e8f0f8;
    --purple: #6b3fa0;
    --purple-light: #f3eef9;
    --teal: #0e7490;
    --teal-light: #e0f7fa;

    --state-solicitado:   #c8410a;
    --state-evaluacion:   #f0a500;
    --state-aprobado:     #1a5c3a;
    --state-implementacion: #1a4a7a;
    --state-verificacion: #6b3fa0;
    --state-cerrado:      #1a1916;
    --state-rechazado:    #9b1c1c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--text);
    color: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #888;
    letter-spacing: 0.05em;
  }

  /* LAYOUT */
  .app { display: flex; min-height: calc(100vh - 56px); }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .btn-nueva {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 16px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .btn-nueva:hover { background: #a83509; }

  /* FILTERS */
  .filter-group { margin-bottom: 12px; }
  .filter-group label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .filter-group select, .filter-group input {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    color: var(--text);
    outline: none;
  }
  .filter-group select:focus, .filter-group input:focus { border-color: var(--accent); }

  /* CC LIST */
  .cc-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .cc-item {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .cc-item:hover { background: var(--surface2); }
  .cc-item.active { background: var(--accent-light); border-left: 3px solid var(--accent); }
  .cc-item-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .cc-item-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cc-item-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .cc-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.8;
  }

  /* BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.04em;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .badge-solicitado     { background: #fdecea; color: var(--state-solicitado); }
  .badge-evaluacion     { background: var(--yellow-light); color: #8a5e00; }
  .badge-aprobado       { background: var(--accent2-light); color: var(--accent2); }
  .badge-implementacion { background: var(--blue-light); color: var(--blue); }
  .badge-verificacion   { background: var(--purple-light); color: var(--purple); }
  .badge-cerrado        { background: #e8e6e2; color: #444; }
  .badge-rechazado      { background: #fdecea; color: #9b1c1c; }

  .badge-critico   { background: #fdecea; color: var(--state-solicitado); }
  .badge-no-critico { background: var(--blue-light); color: var(--blue); }

  .badge-alta   { background: #fdecea; color: var(--state-solicitado); }
  .badge-media  { background: var(--yellow-light); color: #8a5e00; }
  .badge-baja   { background: var(--accent2-light); color: var(--accent2); }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    background: var(--bg);
  }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 400px;
    text-align: center;
    color: var(--text-muted);
  }
  .placeholder-icon {
    width: 64px;
    height: 64px;
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    color: var(--border-strong);
  }
  .placeholder h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
  .placeholder p { font-size: 13px; }
  .hidden { display: none !important; }

  /* CC DETAIL */
  .cc-detail { max-width: 900px; }

  .cc-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 16px;
  }
  .cc-header-left h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .cc-header-left p {
    font-size: 14px;
    color: var(--text-muted);
    max-width: 550px;
  }
  .cc-header-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

  /* PROGRESS BAR */
  .progress-bar {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-step {
    flex: 1;
    padding: 10px 6px;
    text-align: center;
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-right: 1px solid var(--border);
    transition: all 0.2s;
  }
  .progress-step:last-child { border-right: none; }
  .progress-step.done { background: var(--accent2-light); color: var(--accent2); }
  .progress-step.current { background: var(--accent); color: white; }
  .progress-step.rechazado { background: #fdecea; color: #9b1c1c; }
  .progress-step .step-num {
    display: block;
    font-size: 15px;
    margin-bottom: 2px;
  }

  /* SECTIONS */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .section-header {
    padding: 14px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: var(--bg); }
  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .section-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--text);
    color: white;
    padding: 2px 6px;
    border-radius: 2px;
  }
  .section-body { padding: 20px; }
  .section-body.hidden { display: none; }

  /* FORM ELEMENTS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .form-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
  .form-full { grid-column: 1 / -1; }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 9px 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    resize: vertical;
    transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); background: white; }
  .form-group input[readonly],
  .form-group textarea[readonly] {
    background: var(--bg);
    color: var(--text-muted);
    cursor: default;
  }

  /* CHECK ITEMS */
  .check-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.1s;
    font-size: 12px;
  }
  .check-item:hover { background: var(--accent-light); border-color: var(--accent); }
  .check-item input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; }
  .check-item.checked { background: var(--accent-light); border-color: var(--accent); font-weight: 500; }

  /* IMPACTO TABLE */
  .impacto-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .impacto-table th {
    background: var(--text);
    color: white;
    padding: 8px 10px;
    text-align: left;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .impacto-table td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .impacto-table tr:hover td { background: var(--surface2); }
  .impacto-table select {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    color: var(--text);
    outline: none;
  }
  .impacto-table select:focus { border-color: var(--accent); }

  /* RESPONSABLES TABLE */
  .resp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .resp-table th {
    background: var(--surface2);
    padding: 8px 10px;
    text-align: left;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
    text-transform: uppercase;
  }
  .resp-table td {
    padding: 6px 6px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .resp-table input, .resp-table select {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    color: var(--text);
    outline: none;
  }
  .resp-table input:focus, .resp-table select:focus { border-color: var(--accent); }

  /* RADIO GROUP */
  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-group label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    cursor: pointer;
    padding: 5px 10px;
    border: 1px solid var(--border);
    transition: all 0.1s;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    color: var(--text);
  }
  .radio-group label:hover { border-color: var(--border-strong); }
  .radio-group input[type="radio"] { accent-color: var(--accent); }

  /* BUTTONS */
  .btn {
    border: none;
    padding: 9px 18px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #a83509; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-success { background: var(--accent2); color: white; }
  .btn-success:hover { background: #145030; }
  .btn-danger { background: #fdecea; color: #9b1c1c; border: 1px solid #f5c6c6; }
  .btn-danger:hover { background: #f5c6c6; }
  .btn-reject { background: #9b1c1c; color: white; }
  .btn-reject:hover { background: #7a1515; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .form-actions {
    display: flex;
    gap: 12px;
    padding: 20px 0;
    margin-top: 4px;
    align-items: center;
    flex-wrap: wrap;
  }
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,25,22,0.55);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .btn-close {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--text-muted);
    line-height: 1;
    padding: 0 4px;
  }
  .modal-body { padding: 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: white;
    padding: 12px 20px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.04em;
    z-index: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s ease;
    border-left: 3px solid var(--accent);
    max-width: 360px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* DASHBOARD */
  .dashboard-view { max-width: 900px; }
  .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .dashboard-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
  }
  .dashboard-card h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .stat-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 36px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 12px; color: var(--text-muted); }

  .pendientes-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .pendientes-table th {
    background: var(--surface2);
    padding: 8px 10px;
    text-align: left;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
    text-transform: uppercase;
  }
  .pendientes-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }

  /* EVIDENCIAS */
  .evidencia-img {
    display: inline-block;
    margin: 6px;
    position: relative;
    border: 1px solid var(--border);
    background: var(--surface2);
  }

  /* SUBTITLES inside sections */
  .subsection-title {
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 12px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ASISTENTES */
  .asistente-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .asistente-item span { flex: 1; font-size: 12px; }
  .asistente-item button { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 11px; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>⚙ Control de Cambios · Vessena S.A.</h1>
  <span>REG-SOP-DOC-005-A</span>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <button class="btn-nueva" onclick="abrirModalNuevo()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo Control de Cambios
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Filtros</div>
      <div class="filter-group">
        <label>Estado</label>
        <select id="filtroEstado" onchange="renderLista()">
          <option value="">Todos</option>
          <option value="Solicitado">Solicitado</option>
          <option value="En evaluación">En evaluación</option>
          <option value="Aprobado">Aprobado</option>
          <option value="En implementación">En implementación</option>
          <option value="En verificación">En verificación</option>
          <option value="Cerrado">Cerrado</option>
          <option value="Rechazado">Rechazado</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Tipo de cambio</label>
        <select id="filtroTipo" onchange="renderLista()">
          <option value="">Todos</option>
          <option value="General">General</option>
          <option value="Fórmulas/Procesos">Fórmulas/Procesos</option>
          <option value="Metodología analítica">Metodología analítica</option>
          <option value="Componentes/Materias primas">Componentes/MP</option>
          <option value="Productos nuevos">Productos nuevos</option>
          <option value="Modificación presentaciones">Modif. presentaciones</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Criticidad</label>
        <select id="filtroCriticidad" onchange="renderLista()">
          <option value="">Todas</option>
          <option value="Crítico">Crítico</option>
          <option value="No crítico">No crítico</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Buscar</label>
        <input type="text" id="filtroBuscar" placeholder="Título, departamento..." oninput="renderLista()">
      </div>
    </div>

    <div class="sidebar-section" style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-secondary btn-sm" style="flex:1" onclick="mostrarDashboard()">📊 Dashboard</button>
      <button class="btn btn-secondary btn-sm" style="flex:1" onclick="exportarResumenPDF()">📄 Resumen PDF</button>
    </div>

    <div class="cc-list" id="ccList">
      <div class="cc-empty">No hay registros aún.<br>Creá el primer CC.</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <h2>Seleccioná un Control de Cambios</h2>
      <p>O creá uno nuevo con el botón de arriba</p>
    </div>
    <div id="ccDetail" class="cc-detail hidden"></div>
    <div id="dashboardView" class="dashboard-view hidden"></div>
  </main>
</div>

<!-- MODAL NUEVO CC -->
<div class="modal-overlay hidden" id="modalNuevo">
  <div class="modal">
    <div class="modal-header">
      <h3>Nuevo Control de Cambios</h3>
      <button class="btn-close" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group form-full">
          <label>Título del cambio *</label>
          <input type="text" id="nuevoTitulo" placeholder="Descripción breve del cambio solicitado">
        </div>
        <div class="form-group">
          <label>Departamento solicitante *</label>
          <input type="text" id="nuevoDepartamento" placeholder="Área / Departamento">
        </div>
        <div class="form-group">
          <label>Fecha de solicitud *</label>
          <input type="date" id="nuevoFecha">
        </div>
        <div class="form-group">
          <label>Tipo de cambio *</label>
          <select id="nuevoTipoCambio">
            <option value="">— Seleccionar —</option>
            <option value="General">General (instalaciones, equipos, sistemas, personal, docs)</option>
            <option value="Fórmulas/Procesos">Fórmulas / Procesos productivos</option>
            <option value="Metodología analítica">Metodología analítica</option>
            <option value="Componentes/Materias primas">Componentes / Materias primas</option>
            <option value="Productos nuevos">Productos nuevos</option>
            <option value="Modificación presentaciones">Modificación de presentaciones</option>
          </select>
        </div>
        <div class="form-group">
          <label>Criticidad</label>
          <select id="nuevoCriticidad">
            <option value="">— Seleccionar —</option>
            <option value="Crítico">Crítico</option>
            <option value="No crítico">No crítico</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prioridad</label>
          <select id="nuevoPrioridad">
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
            <option value="Baja">Baja</option>
          </select>
        </div>
        <div class="form-group form-full">
          <label>Aspecto a modificar</label>
          <input type="text" id="nuevoAspecto" placeholder="¿Qué se quiere cambiar?">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearCC()">Crear Control de Cambios</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="loadingOverlay" style="position:fixed;inset:0;background:rgba(244,243,239,0.88);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;display:none;">
  <div style="width:36px;height:36px;border:3px solid #ddd9d0;border-top-color:#c8410a;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  <span style="font-family:monospace;font-size:12px;color:#6b6560;letter-spacing:0.06em;">CARGANDO DATOS...</span>
</div>

<script>
// ==================== CONFIG ====================
const API_URL = 'https://script.google.com/macros/s/AKfycbwiIr60f7GWLPrRV0cVhLFp7Hm3Igc8qKEL1sWZiAd6vgDFD8XyP0Yu29fxof03ipdE/exec';

let db = { ccs: [], counter: 0 };
let ccActivaId = null;

// ==================== ESTADOS ====================
const ESTADOS = ['Solicitado','En evaluación','Aprobado','En implementación','En verificación','Cerrado'];
const ESTADO_BADGE = {
  'Solicitado':       'badge-solicitado',
  'En evaluación':    'badge-evaluacion',
  'Aprobado':         'badge-aprobado',
  'En implementación':'badge-implementacion',
  'En verificación':  'badge-verificacion',
  'Cerrado':          'badge-cerrado',
  'Rechazado':        'badge-rechazado'
};

const AREAS_IMPACTO = [
  'Producto','Regulatorio','Aseguramiento de Calidad','Control de Calidad',
  'Producción','I+D','Ingeniería','IT','Compras','Depósito',
  'Marketing','Documentos','Personal','Validación','Otros'
];

const CHECKLIST_EVALUACION = [
  'Impacto en la calidad del producto',
  'Impacto regulatorio / registros',
  'Necesidad de revalidación o recalificación',
  'Impacto en documentación (SOPs, especificaciones)',
  'Impacto en proveedores o materias primas',
  'Necesidad de capacitación del personal',
  'Impacto en equipos o instalaciones',
  'Impacto en sistemas informáticos',
  'Análisis de riesgo realizado'
];

const CHECKLIST_CIERRE = [
  'Documentación actualizada (SOPs, registros, especificaciones)',
  'Personal capacitado y con registro de capacitación',
  'Validaciones/calificaciones completadas',
  'Notificaciones a autoridades realizadas (si corresponde)',
  'Notificaciones a clientes/distribuidores realizadas (si corresponde)',
  'Efectividad del cambio verificada',
  'Plan de contingencia archivado (si se aplicó)',
  'Todos los responsables notificados del cierre'
];

// ==================== STORAGE ====================
async function cargarDatos() {
  mostrarCargando(true);
  try {
    const res = await fetch(`${API_URL}?action=getAll_CC`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    db.ccs = data.ccs || [];
    db.counter = db.ccs.reduce((max, cc) => {
      const match = cc.numero && cc.numero.match(/CC (\d+)\/(\d+)/);
      const year = match ? parseInt(match[2]) : 0;
      const num = (year === new Date().getFullYear() && match) ? parseInt(match[1]) : 0;
      return Math.max(max, num);
    }, 0);
  } catch(e) {
    console.error('Error cargarDatos:', e);
    showToast('Error al cargar: ' + e.message);
  }
  mostrarCargando(false);
  renderLista();
}

async function guardarCC_remoto(cc, notificar=false) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=saveCC&data=' + encodeURIComponent(JSON.stringify(cc))
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.ok && notificar) {
      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'action=notifyCC&data=' + encodeURIComponent(JSON.stringify(cc))
        });
      } catch(e) { /* mail error no bloquea */ }
    }
    return data.ok;
  } catch(e) {
    console.error('Error guardando CC:', e);
    showToast('Error al guardar. Verificá la conexión.');
    return false;
  }
}

async function eliminarCC_remoto(id) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=deleteCC&id=' + encodeURIComponent(id)
    });
    const data = await res.json();
    return data.ok;
  } catch(e) {
    showToast('Error al eliminar.');
    return false;
  }
}

function mostrarCargando(show) {
  const el = document.getElementById('loadingOverlay');
  if (el) el.style.display = show ? 'flex' : 'none';
}

// ==================== MODAL ====================
function abrirModalNuevo() {
  document.getElementById('modalNuevo').classList.remove('hidden');
  document.getElementById('nuevoFecha').value = new Date().toISOString().split('T')[0];
}
function cerrarModal() {
  document.getElementById('modalNuevo').classList.add('hidden');
}

// ==================== LISTA ====================
function renderLista() {
  const filtroEstado = document.getElementById('filtroEstado').value;
  const filtroTipo   = document.getElementById('filtroTipo').value;
  const filtroCrit   = document.getElementById('filtroCriticidad').value;
  const filtroBuscar = document.getElementById('filtroBuscar').value.toLowerCase();

  let ccs = db.ccs.filter(cc => {
    if (filtroEstado && cc.estado !== filtroEstado) return false;
    if (filtroTipo && cc.tipoCambio !== filtroTipo) return false;
    if (filtroCrit && cc.criticidad !== filtroCrit) return false;
    if (filtroBuscar) {
      const h = ((cc.numero||'') + ' ' + (cc.titulo||'') + ' ' + (cc.departamento||'')).toLowerCase();
      if (!h.includes(filtroBuscar)) return false;
    }
    return true;
  });

  const list = document.getElementById('ccList');
  if (ccs.length === 0) {
    list.innerHTML = '<div class="cc-empty">Sin resultados.</div>';
    return;
  }

  list.innerHTML = ccs.map(cc => `
    <div class="cc-item${cc.id === ccActivaId ? ' active' : ''}" onclick="abrirCC(${cc.id})">
      <div class="cc-item-num">${cc.numero}</div>
      <div class="cc-item-title">${cc.titulo || '—'}</div>
      <div class="cc-item-meta">
        <span class="badge ${ESTADO_BADGE[cc.estado] || ''}">${cc.estado}</span>
        ${cc.criticidad ? `<span class="badge ${cc.criticidad === 'Crítico' ? 'badge-critico' : 'badge-no-critico'}">${cc.criticidad}</span>` : ''}
        ${cc.prioridad ? `<span class="badge ${cc.prioridad === 'Alta' ? 'badge-alta' : (cc.prioridad === 'Media' ? 'badge-media' : 'badge-baja')}">${cc.prioridad}</span>` : ''}
      </div>
    </div>
  `).join('');
}

// ==================== ABRIR CC ====================
function abrirCC(id) {
  ocultarDashboard();
  ccActivaId = id;
  renderLista();
  const cc = db.ccs.find(c => c.id === id);
  if (!cc) return;
  const ph = document.getElementById('placeholder');
  const det = document.getElementById('ccDetail');
  ph.classList.add('hidden');
  ph.style.display = 'none';
  det.classList.remove('hidden');
  det.style.display = 'block';
  renderDetalle(cc);
  window.scrollTo(0, 0);
  document.querySelector('.main').scrollTop = 0;
}

function renderDetalle(cc) {
  const stateIdx = ESTADOS.indexOf(cc.estado);
  const steps = ESTADOS.map((e,i) => {
    let cls = '';
    if (cc.estado === 'Rechazado') {
      cls = i === 0 ? 'done' : '';
    } else {
      cls = i < stateIdx ? 'done' : (i === stateIdx ? 'current' : '');
    }
    const icons = ['①','②','③','④','⑤','⑥'];
    return `<div class="progress-step ${cls}"><span class="step-num">${cc.estado === 'Rechazado' && i === stateIdx ? '✗' : icons[i]}</span>${e}</div>`;
  }).join('');

  const det = document.getElementById('ccDetail');
  det.innerHTML = `
    <div class="cc-header">
      <div class="cc-header-left">
        <h2>${cc.numero}</h2>
        <p>${cc.departamento || ''} · ${cc.titulo || ''}</p>
      </div>
      <div class="cc-header-actions">
        <button class="btn btn-secondary btn-sm" onclick="exportarCC_PDF(${cc.id})">📄 PDF</button>
        ${cc.estado !== 'Cerrado' && cc.estado !== 'Rechazado' ? `<button class="btn btn-secondary btn-sm" onclick="avanzarEstado(${cc.id})">Avanzar →</button>` : ''}
        ${cc.estado !== 'Cerrado' && cc.estado !== 'Rechazado' ? `<button class="btn btn-reject btn-sm" onclick="rechazarCC(${cc.id})">✕ Rechazar</button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="eliminarCC(${cc.id})">Eliminar</button>
      </div>
    </div>
    <div class="progress-bar">${steps}${cc.estado === 'Rechazado' ? '<div class="progress-step rechazado"><span class="step-num">✗</span>Rechazado</div>' : ''}</div>
    ${renderS1(cc)}
    ${renderS2(cc)}
    ${renderS3(cc)}
    ${renderS4(cc)}
    ${renderS5(cc)}
    ${renderS6(cc)}
    ${renderS7(cc)}
    ${renderS8(cc)}
    ${renderEvidencias(cc)}
    <div class="form-actions">
      <button class="btn btn-primary" onclick="guardarCC(${cc.id})">💾 Guardar cambios</button>
      ${cc.estado !== 'Cerrado' && cc.estado !== 'Rechazado'
        ? `<button class="btn btn-success" onclick="avanzarEstado(${cc.id})">Avanzar estado →</button>`
        : `<span class="badge ${cc.estado === 'Rechazado' ? 'badge-rechazado' : 'badge-cerrado'}" style="padding:9px 16px;font-size:12px;">${cc.estado === 'Rechazado' ? '✗ CC Rechazado' : '✔ CC Cerrado'}</span>`
      }
    </div>
  `;
}

// ==================== SECCIÓN 1: CARÁTULA ====================
function renderS1(cc) {
  const tipos = ['General','Fórmulas/Procesos','Metodología analítica','Componentes/Materias primas','Productos nuevos','Modificación presentaciones'];
  return `
  <div class="section-card">
    <div class="section-header" onclick="toggleSection(this)">
      <div class="section-title"><span class="section-num">01</span> Carátula</div>
      <span>▾</span>
    </div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group">
          <label>N° de Control de Cambios</label>
          <input type="text" value="${cc.numero}" readonly>
        </div>
        <div class="form-group">
          <label>Estado actual</label>
          <input type="text" value="${cc.estado}" readonly>
        </div>
        <div class="form-group form-full">
          <label>Título del cambio</label>
          <input type="text" id="f_titulo" value="${esc(cc.titulo)}">
        </div>
        <div class="form-group">
          <label>Departamento solicitante</label>
          <input type="text" id="f_departamento" value="${esc(cc.departamento)}">
        </div>
        <div class="form-group">
          <label>Fecha de solicitud</label>
          <input type="date" id="f_fechaSolicitud" value="${cc.fechaSolicitud || ''}">
        </div>
        <div class="form-group form-full">
          <label>Aspecto a modificar</label>
          <input type="text" id="f_aspecto" value="${esc(cc.aspecto)}">
        </div>
        <div class="form-group">
          <label>Tipo de cambio</label>
          <select id="f_tipoCambio">
            ${tipos.map(t => `<option value="${t}" ${cc.tipoCambio===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Naturaleza</label>
          <select id="f_naturaleza">
            <option value="">— Seleccionar —</option>
            ${['Permanente','Temporario','Planificado','No planificado'].map(t => `<option value="${t}" ${cc.naturaleza===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Criticidad</label>
          <select id="f_criticidad">
            <option value="">— Seleccionar —</option>
            <option value="Crítico" ${cc.criticidad==='Crítico'?'selected':''}>Crítico</option>
            <option value="No crítico" ${cc.criticidad==='No crítico'?'selected':''}>No crítico</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prioridad</label>
          <select id="f_prioridad">
            <option value="">— Seleccionar —</option>
            ${['Alta','Media','Baja'].map(t => `<option value="${t}" ${cc.prioridad===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
  </div>`;
}

// ==================== SECCIÓN 2: DETALLES ====================
function renderS2(cc) {
  const impacto = cc.impactoAreas || {};
  const rows = AREAS_IMPACTO.map(area => {
    const val = impacto[area] || '';
    return `<tr>
      <td style="font-size:12px;font-weight:500;">${area}</td>
      <td>
        <select onchange="updateImpacto(${cc.id},'${area}',this.value)">
          <option value="">—</option>
          <option value="Sin impacto" ${val==='Sin impacto'?'selected':''}>Sin impacto</option>
          <option value="Impacto bajo" ${val==='Impacto bajo'?'selected':''}>Impacto bajo</option>
          <option value="Impacto medio" ${val==='Impacto medio'?'selected':''}>Impacto medio</option>
          <option value="Impacto alto" ${val==='Impacto alto'?'selected':''}>Impacto alto</option>
        </select>
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="section-card">
    <div class="section-header" onclick="toggleSection(this)">
      <div class="section-title"><span class="section-num">02</span> Detalles del Cambio</div>
      <span>▾</span>
    </div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group form-full">
          <label>Descripción del cambio</label>
          <textarea id="f_descripcion" rows="4" placeholder="Describir en detalle qué se cambia, desde qué estado actual a cuál estado futuro">${esc(cc.descripcion)}</textarea>
        </div>
        <div class="form-group form-full">
          <label>Justificación del cambio</label>
          <textarea id="f_justificacion" rows="3" placeholder="¿Por qué es necesario este cambio?">${esc(cc.justificacion)}</textarea>
        </div>
      </div>
      <hr class="divider">
      <div class="subsection-title">Tabla de impacto por área</div>
      <table class="impacto-table">
        <thead><tr><th style="width:200px">Área</th><th>Nivel de impacto</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ==================== SECCIÓN 3: REUNIÓN DE DISCUSIÓN ====================
function renderS3(cc) {
  const asistentes = (cc.asistentes || []).map((a,i) => `
    <div class="asistente-item">
      <span>${a.nombre} — ${a.sector || ''}</span>
      <button onclick="eliminarAsistente(${cc.id},${i})">✕</button>
    </div>
  `).join('') || '<p style="font-size:12px;color:var(--text-muted)">Sin asistentes registrados.</p>';

  const aspectos = cc.aspectosEvaluados || {};
  const checkAspectos = CHECKLIST_EVALUACION.map(a => {
    const key = btoa(a).replace(/=/g,'');
    const checked = aspectos[key] === true;
    return `<label class="check-item${checked?' checked':''}">
      <input type="checkbox" data-aspecto="${key}" ${checked?'checked':''} onchange="toggleAspecto(this,${cc.id})"> ${a}
    </label>`;
  }).join('');

  return `
  <div class="section-card">
    <div class="section-header" onclick="toggleSection(this)">
      <div class="section-title"><span class="section-num">03</span> Reunión de Discusión y Evaluación</div>
      <span>▾</span>
    </div>
    <div class="section-body">
      <div class="subsection-title">Asistentes</div>
      <div id="asistentesList_${cc.id}" style="margin-bottom:10px;">${asistentes}</div>
      <div class="form-grid" style="margin-bottom:10px;">
        <div class="form-group">
          <label>Nombre del asistente</label>
          <input type="text" id="f_asisNombre" placeholder="Nombre y apellido">
        </div>
        <div class="form-group">
          <label>Sector / Cargo</label>
          <input type="text" id="f_asisSector" placeholder="Área o cargo">
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" style="margin-bottom:20px" onclick="agregarAsistente(${cc.id})">+ Agregar asistente</button>

      <hr class="divider">
      <div class="subsection-title">Aspectos evaluados</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;">${checkAspectos}</div>

      <hr class="divider">
      <div class="form-grid">
        <div class="form-group form-full">
          <label>Plan de contingencia</label>
          <textarea id="f_planContingencia" rows="3" placeholder="Describir el plan de contingencia en caso de que el cambio no sea exitoso">${esc(cc.planContingencia)}</textarea>
        </div>
        <div class="form-group">
          <label>Período de implementación (desde)</label>
          <input type="date" id="f_periodoDesde" value="${cc.periodoDesde || ''}">
        </div>
        <div class="form-group">
          <label>Período de implementación (hasta)</label>
          <input type="date" id="f_periodoHasta" value="${cc.periodoHasta || ''}">
        </div>
        <div class="form-group form-full">
          <label>Procedimiento de implementación</label>
          <textarea id="f_procImplementacion" rows="3" placeholder="Pasos para implementar el cambio">${esc(cc.procImplementacion)}</textarea>
        </div>
        <div class="form-group form-full">
          <label>Procedimiento de verificación</label>
          <textarea id="f_procVerificacion" rows="3" placeholder="¿Cómo se verificará que el cambio fue exitoso?">${esc(cc.procVerificacion)}</textarea>
        </div>
        <div class="form-group form-full">
          <label>Criterio de aceptación</label>
          <textarea id="f_criterioAceptacion" rows="2" placeholder="Criterios que definen éxito del cambio">${esc(cc.criterioAceptacion)}</textarea>
        </div>
      </div>

      <hr class="divider">
      <div class="subsection-title">Clasificación final y decisión</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Clasificación final</label>
          <select id="f_clasificacionFinal">
            <option value="">— Seleccionar —</option>
            ${['Crítico','No crítico'].map(t=>`<option value="${t}" ${cc.clasificacionFinal===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Decisión de reunión</label>
          <select id="f_decisionReunion">
            <option value="">— Seleccionar —</option>
            <option value="Aprobar" ${cc.decisionReunion==='Aprobar'?'selected':''}>Aprobar</option>
            <option value="Rechazar" ${cc.decisionReunion==='Rechazar'?'selected':''}>Rechazar</option>
            <option value="Pendiente" ${cc.decisionReunion==='Pendiente'?'selected':''}>Pendiente</option>
          </select>
        </div>
        <div class="form-group form-full">
          <label>Observaciones de la reunión</label>
          <textarea id="f_obsReunion" rows="2" placeholder="Observaciones generales de la reunión de evaluación">${esc(cc.obsReunion)}</textarea>
        </div>
      </div>

      <hr class="divider">
      <div class="subsection-title">Responsables de implementación</div>
      <div id="respTable_${cc.id}">${renderRespTable(cc)}</div>
      <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="agregarResponsable(${cc.id})">+ Agregar responsable</button>
    </div>
  </div>`;
}

function renderRespTable(cc) {
  const resps = cc.responsables || [];
  const rows = resps.map((r,i) => `

// ==================== HELPERS ====================
function esc(v) { return (v||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function toggleSection(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('span:last-child');
  body.classList.toggle('hidden');
  arrow.textContent = body.classList.contains('hidden') ? '▸' : '▾';
}

function updateImpacto(ccId, area, val) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  if (!cc.impactoAreas) cc.impactoAreas = {};
  cc.impactoAreas[area] = val;
}
function updateNotif(ccId, key, field, val) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  if (!cc.notificaciones) cc.notificaciones = {};
  if (!cc.notificaciones[key]) cc.notificaciones[key] = {};
  cc.notificaciones[key][field] = val;
}
function updateResp(ccId, idx, field, val) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  cc.responsables[idx][field] = val;
}
function toggleAspecto(cb, ccId) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  if (!cc.aspectosEvaluados) cc.aspectosEvaluados = {};
  cc.aspectosEvaluados[cb.dataset.aspecto] = cb.checked;
  cb.closest('.check-item').classList.toggle('checked', cb.checked);
}
function toggleCierre(cb, ccId) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  if (!cc.checklistCierre) cc.checklistCierre = {};
  cc.checklistCierre[cb.dataset.cierre] = cb.checked;
  cb.closest('.check-item').classList.toggle('checked', cb.checked);
}

// ==================== GUARDAR CC ====================
async function guardarCC(ccId) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;

  // Sección 1
  cc.titulo          = document.getElementById('f_titulo').value;
  cc.departamento    = document.getElementById('f_departamento').value;
  cc.fechaSolicitud  = document.getElementById('f_fechaSolicitud').value;
  cc.aspecto         = document.getElementById('f_aspecto').value;
  cc.tipoCambio      = document.getElementById('f_tipoCambio').value;
  cc.naturaleza      = document.getElementById('f_naturaleza').value;
  cc.criticidad      = document.getElementById('f_criticidad').value;
  cc.prioridad       = document.getElementById('f_prioridad').value;
  // Sección 2
  cc.descripcion     = document.getElementById('f_descripcion').value;
  cc.justificacion   = document.getElementById('f_justificacion').value;
  // Sección 3
  cc.planContingencia    = document.getElementById('f_planContingencia').value;
  cc.periodoDesde        = document.getElementById('f_periodoDesde').value;
  cc.periodoHasta        = document.getElementById('f_periodoHasta').value;
  cc.procImplementacion  = document.getElementById('f_procImplementacion').value;
  cc.procVerificacion    = document.getElementById('f_procVerificacion').value;
  cc.criterioAceptacion  = document.getElementById('f_criterioAceptacion').value;
  cc.clasificacionFinal  = document.getElementById('f_clasificacionFinal').value;
  cc.decisionReunion     = document.getElementById('f_decisionReunion').value;
  cc.obsReunion          = document.getElementById('f_obsReunion').value;
  // Sección 4
  cc.obsNotificaciones = document.getElementById('f_obsNotificaciones').value;
  // Sección 5
  if (!cc.liberacion) cc.liberacion = {};
  cc.liberacion.dtNombre   = document.getElementById('f_libDTNombre').value;
  cc.liberacion.dtFecha    = document.getElementById('f_libDTFecha').value;
  cc.liberacion.acNombre   = document.getElementById('f_libACNombre').value;
  cc.liberacion.acSeccion  = document.getElementById('f_libACSeccion').value;
  cc.liberacion.acFecha    = document.getElementById('f_libACFecha').value;
  // Sección 6
  cc.implExitosa      = document.getElementById('f_implExitosa').value;
  cc.implContingencia = document.getElementById('f_implContingencia').value;
  cc.implNotifDT      = document.getElementById('f_implNotifDT').value;
  cc.fechaImplementacion = document.getElementById('f_fechaImplementacion').value;
  cc.obsImplementacion   = document.getElementById('f_obsImplementacion').value;
  // Sección 7
  cc.verifExitosa      = document.getElementById('f_verifExitosa').value;
  cc.verifContingencia = document.getElementById('f_verifContingencia').value;
  cc.verifNotifDT      = document.getElementById('f_verifNotifDT').value;
  cc.fechaVerificacion = document.getElementById('f_fechaVerificacion').value;
  cc.verificadoPor     = document.getElementById('f_verificadoPor').value;
  cc.obsVerificacion   = document.getElementById('f_obsVerificacion').value;
  // Sección 8
  cc.responsableCierre = document.getElementById('f_responsableCierre').value;
  cc.fechaCierre       = document.getElementById('f_fechaCierre').value;
  cc.obsCierre         = document.getElementById('f_obsCierre').value;

  // Check responsables para notificar
  const respParaNotif = (cc.responsables || []).filter(r =>
    r.mail && r.mail.includes('@') && r.tarea && r.plazo && !r._notificado
  );

  showToast('Guardando...');
  const ok = await guardarCC_remoto(cc);
  if (ok) {
    if (respParaNotif.length > 0) {
      try {
        const ccNotif = Object.assign({}, cc, { responsables: respParaNotif });
        await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'action=notifyCC&data=' + encodeURIComponent(JSON.stringify(ccNotif))
        });
        respParaNotif.forEach(r => r._notificado = true);
        await guardarCC_remoto(cc);
        showToast(`${cc.numero} guardado ✔ · ${respParaNotif.length} mail(s) enviado(s)`);
      } catch(e) {
        showToast(`${cc.numero} guardado ✔ (mail no enviado)`);
      }
    } else {
      showToast(`${cc.numero} guardado ✔`);
    }
    renderLista();
  } else {
    showToast('Error al guardar. Intentá de nuevo.');
  }
}

async function avanzarEstado(ccId) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  const idx = ESTADOS.indexOf(cc.estado);
  if (idx < ESTADOS.length - 1) {
    cc.estado = ESTADOS[idx+1];
    showToast('Guardando...');
    const ok = await guardarCC_remoto(cc);
    if (ok) { renderLista(); renderDetalle(cc); showToast(`Estado: ${cc.estado} ✔`); }
  }
}

async function rechazarCC(ccId) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  if (!confirm('¿Rechazar este Control de Cambios?')) return;
  cc.estado = 'Rechazado';
  const ok = await guardarCC_remoto(cc);
  if (ok) { renderLista(); renderDetalle(cc); showToast(`${cc.numero} rechazado`); }
}

async function eliminarCC(ccId) {
  if (!confirm('¿Eliminar este Control de Cambios? Esta acción no se puede deshacer.')) return;
  showToast('Eliminando...');
  const ok = await eliminarCC_remoto(ccId);
  if (ok) {
    db.ccs = db.ccs.filter(c => c.id !== ccId);
    ccActivaId = null;
    renderLista();
    document.getElementById('ccDetail').classList.add('hidden');
    document.getElementById('placeholder').classList.remove('hidden');
    showToast('CC eliminado');
  }
}

async function crearCC() {
  const titulo      = document.getElementById('nuevoTitulo').value.trim();
  const depto       = document.getElementById('nuevoDepartamento').value.trim();
  const fecha       = document.getElementById('nuevoFecha').value;
  const tipoCambio  = document.getElementById('nuevoTipoCambio').value;
  if (!titulo || !depto || !fecha || !tipoCambio) {
    showToast('Completá los campos obligatorios (*)'); return;
  }
  db.counter++;
  const cc = {
    id: Date.now(),
    numero: `CC ${String(db.counter).padStart(3,'0')}/${new Date().getFullYear()}`,
    estado: 'Solicitado',
    titulo, departamento: depto, fechaSolicitud: fecha,
    aspecto: document.getElementById('nuevoAspecto').value.trim(),
    tipoCambio,
    naturaleza: '',
    criticidad: document.getElementById('nuevoCriticidad').value,
    prioridad: document.getElementById('nuevoPrioridad').value,
    descripcion: '', justificacion: '',
    impactoAreas: {},
    asistentes: [],
    aspectosEvaluados: {},
    planContingencia: '', periodoDesde: '', periodoHasta: '',
    procImplementacion: '', procVerificacion: '', criterioAceptacion: '',
    clasificacionFinal: '', decisionReunion: '', obsReunion: '',
    responsables: [],
    notificaciones: {}, obsNotificaciones: '',
    liberacion: {},
    implExitosa: '', implContingencia: '', implNotifDT: '', fechaImplementacion: '', obsImplementacion: '',
    verifExitosa: '', verifContingencia: '', verifNotifDT: '', fechaVerificacion: '', verificadoPor: '', obsVerificacion: '',
    checklistCierre: {}, responsableCierre: '', fechaCierre: '', obsCierre: '',
    evidencias: []
  };
  cerrarModal();
  showToast('Guardando...');
  const ok = await guardarCC_remoto(cc, true);
  if (ok) {
    db.ccs.unshift(cc);
    renderLista();
    abrirCC(cc.id);
    showToast(`${cc.numero} creado ✔`);
  } else {
    db.counter--;
    showToast('Error al crear el CC.');
  }
}

// ==================== DASHBOARD ====================
function mostrarDashboard() {
  document.getElementById('placeholder').classList.add('hidden');
  document.getElementById('ccDetail').classList.add('hidden');
  ccActivaId = null;
  renderLista();

  const dash = document.getElementById('dashboardView');
  dash.classList.remove('hidden');

  const ccs = db.ccs;
  const total = ccs.length;
  const abiertos = ccs.filter(c => !['Cerrado','Rechazado'].includes(c.estado)).length;
  const vencidos = ccs.filter(c => {
    return (c.responsables||[]).some(r => r.plazo && new Date(r.plazo) < new Date() && r.cumplida !== 'Si');
  }).length;
  const rechazados = ccs.filter(c => c.estado === 'Rechazado').length;

  // Estado counts
  const estadoCounts = {};
  ESTADOS.forEach(e => estadoCounts[e] = 0);
  estadoCounts['Rechazado'] = 0;
  ccs.forEach(c => { if (estadoCounts[c.estado] !== undefined) estadoCounts[c.estado]++; });

  // Tipo counts
  const tipoCounts = {};
  ccs.forEach(c => { if (c.tipoCambio) tipoCounts[c.tipoCambio] = (tipoCounts[c.tipoCambio]||0)+1; });

  // Mes counts
  const mesCounts = {};
  ccs.forEach(c => {
    if (c.fechaSolicitud) {
      const m = c.fechaSolicitud.substring(0,7);
      mesCounts[m] = (mesCounts[m]||0)+1;
    }
  });
  const mesesOrdenados = Object.keys(mesCounts).sort().slice(-6);

  // Pendientes
  const pendientes = [];
  ccs.forEach(cc => {
    if (['Cerrado','Rechazado'].includes(cc.estado)) return;
    (cc.responsables||[]).forEach(r => {
      if (r.cumplida === 'Si' || !r.tarea) return;
      const hoy = new Date();
      const plazoDate = r.plazo ? new Date(r.plazo) : null;
      let estadoTag = '';
      if (plazoDate && plazoDate < hoy) estadoTag = '<span style="color:#dc3545;font-weight:600;">VENCIDA</span>';
      else if (plazoDate) {
        const dias = Math.round((plazoDate - hoy) / (1000*60*60*24));
        estadoTag = dias <= 7
          ? `<span style="color:#f0a500;font-weight:600;">${dias} días</span>`
          : `<span style="color:var(--text-muted);">${dias} días</span>`;
      } else estadoTag = '<span style="color:var(--text-muted);">Sin plazo</span>';
      pendientes.push({ responsable: r.nombre||'Sin asignar', cc: cc.numero, tarea: r.tarea, plazo: r.plazo ? new Date(r.plazo).toLocaleDateString('es-AR') : '—', estadoTag, plazoDate: plazoDate||new Date('2099-01-01') });
    });
  });
  pendientes.sort((a,b) => a.plazoDate - b.plazoDate);

  dash.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
      <div>
        <h2 style="font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--accent);">Dashboard</h2>
        <p style="font-size:13px;color:var(--text-muted);">Control de Cambios · Vessena S.A.</p>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="ocultarDashboard()">← Volver</button>
    </div>

    <div class="dashboard-grid">
      <div class="dashboard-card">
        <h3>Total de CCs</h3>
        <div class="stat-number">${total}</div>
        <div class="stat-label">${abiertos} activos · ${rechazados} rechazados</div>
      </div>
      <div class="dashboard-card">
        <h3>Tareas vencidas</h3>
        <div class="stat-number" style="color:${vencidos>0?'#dc3545':'var(--accent2)'}">${vencidos}</div>
        <div class="stat-label">${vencidos>0 ? 'Requieren atención' : 'Sin vencimientos'}</div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="dashboard-card">
        <h3>Por estado</h3>
        <canvas id="chartEstado" height="180"></canvas>
      </div>
      <div class="dashboard-card">
        <h3>Por tipo de cambio</h3>
        <canvas id="chartTipo" height="180"></canvas>
      </div>
    </div>

    <div class="dashboard-card" style="margin-bottom:20px;">
      <h3>Apertura por mes (últimos 6 meses)</h3>
      <canvas id="chartMes" height="80"></canvas>
    </div>

    <div class="section-card">
      <div class="section-header" style="cursor:default;">
        <div class="section-title"><span class="section-num">⚠</span> Tareas pendientes por responsable</div>
      </div>
      <div class="section-body" style="padding:0;">
        <table class="pendientes-table">
          <thead><tr><th>Responsable</th><th>CC</th><th>Tarea</th><th>Plazo</th><th>Estado</th></tr></thead>
          <tbody id="tbodyPendientes"></tbody>
        </table>
      </div>
    </div>
  `;

  // Render pendientes
  const tbody = document.getElementById('tbodyPendientes');
  if (pendientes.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px;">🎉 No hay tareas pendientes</td></tr>';
  } else {
    tbody.innerHTML = pendientes.map(p =>
      `<tr>
        <td style="font-weight:500;font-size:12px;">${p.responsable}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);">${p.cc}</td>
        <td style="font-size:12px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.tarea}</td>
        <td style="font-size:12px;">${p.plazo}</td>
        <td>${p.estadoTag}</td>
      </tr>`
    ).join('');
  }

  // Load Chart.js and render
  if (typeof Chart === 'undefined') {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload = () => renderChartsDashboard(estadoCounts, tipoCounts, mesesOrdenados, mesCounts);
    document.head.appendChild(s);
  } else {
    renderChartsDashboard(estadoCounts, tipoCounts, mesesOrdenados, mesCounts);
  }
}

function renderChartsDashboard(estadoCounts, tipoCounts, meses, mesCounts) {
  const colors = {
    'Solicitado': '#c8410a', 'En evaluación': '#f0a500', 'Aprobado': '#1a5c3a',
    'En implementación': '#1a4a7a', 'En verificación': '#6b3fa0', 'Cerrado': '#555', 'Rechazado': '#9b1c1c'
  };

  new Chart(document.getElementById('chartEstado'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(estadoCounts).filter(k => estadoCounts[k] > 0),
      datasets: [{ data: Object.values(estadoCounts).filter(v => v > 0), backgroundColor: Object.keys(estadoCounts).filter(k => estadoCounts[k] > 0).map(k => colors[k]||'#ccc') }]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
  });

  const tipoColors = ['#c8410a','#f0a500','#1a5c3a','#1a4a7a','#6b3fa0','#0e7490'];
  new Chart(document.getElementById('chartTipo'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(tipoCounts),
      datasets: [{ data: Object.values(tipoCounts), backgroundColor: tipoColors }]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
  });

  new Chart(document.getElementById('chartMes'), {
    type: 'bar',
    data: {
      labels: meses,
      datasets: [{ label: 'CCs abiertos', data: meses.map(m => mesCounts[m]||0), backgroundColor: '#c8410a', borderRadius: 3 }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
    }
  });
}

function ocultarDashboard() {
  const d = document.getElementById('dashboardView');
  if (d) d.classList.add('hidden');
}

// ==================== EVIDENCIAS ====================
async function comprimirImagen(file, maxWidth=600, quality=0.35) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        const base64 = dataUrl.split(',')[1];
        resolve({ base64, sizeKB: Math.round(base64.length * 3 / 4 / 1024), nombre: file.name });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function subirEvidencias(ccId, files) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  if (!cc.evidencias) cc.evidencias = [];
  const status = document.getElementById('uploadStatus');
  const total = files.length;
  let subidas = 0;
  for (let i = 0; i < total; i++) {
    status.textContent = 'Comprimiendo ' + (i+1) + '/' + total + '...';
    try {
      const compressed = await comprimirImagen(files[i]);
      status.textContent = 'Subiendo ' + (i+1) + '/' + total + ' (' + compressed.sizeKB + 'KB)...';
      const ccName = cc.numero.replace(/[\s\/]/g, '_');
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'action=uploadImg&imgData=' + encodeURIComponent(compressed.base64) +
              '&filename=' + encodeURIComponent(compressed.nombre) +
              '&ncNumero=' + encodeURIComponent(ccName)
      });
      const data = await res.json();
      if (data.ok) {
        cc.evidencias.push({ fileId: data.fileId, thumbUrl: data.url, viewUrl: data.viewUrl, nombre: compressed.nombre, fecha: new Date().toISOString().split('T')[0], sizeKB: compressed.sizeKB });
        subidas++;
      } else showToast('Error al subir ' + compressed.nombre);
    } catch(e) { showToast('Error: ' + e.message); }
  }
  if (subidas > 0) {
    status.textContent = 'Guardando...';
    const ok = await guardarCC_remoto(cc);
    if (ok) { renderDetalle(cc); showToast(subidas + ' foto(s) subida(s) ✔'); }
    else showToast('Error al guardar evidencias');
  }
  status.textContent = '';
}

async function eliminarEvidencia(ccId, idx) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  if (!confirm('¿Eliminar esta evidencia?')) return;
  cc.evidencias.splice(idx, 1);
  const ok = await guardarCC_remoto(cc);
  if (ok) renderDetalle(cc);
}

function exportarResumenPDF() {
  cargarJsPDF(() => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('landscape', 'mm', 'a4');
    const hoy = new Date().toLocaleDateString('es-AR');
    doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(200,65,10);
    doc.text('Control de Cambios — Resumen', 14, 18);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(100);
    doc.text('Fecha: ' + hoy + ' | Total: ' + db.ccs.length + ' CCs  |  REG-SOP-DOC-005-A', 14, 25);
    const headers = [['N°','Estado','Tipo','Título','Departamento','Criticidad','Prioridad','Fecha']];
    const rows = db.ccs.map(cc => [
      cc.numero, cc.estado, cc.tipoCambio||'—',
      cc.titulo ? (cc.titulo.length>50 ? cc.titulo.substring(0,50)+'...' : cc.titulo) : '—',
      cc.departamento||'—', cc.criticidad||'—', cc.prioridad||'—', cc.fechaSolicitud||'—'
    ]);
    doc.autoTable({ head:headers, body:rows, startY:32, styles:{fontSize:7,cellPadding:2.5}, headStyles:{fillColor:[30,25,22],fontSize:7}, alternateRowStyles:{fillColor:[248,247,243]} });
    doc.save('Resumen_CC_' + hoy.replace(/\//g,'-') + '.pdf');
    showToast('Resumen PDF descargado');
  });
}

function exportarCC_PDF(ccId) {
  const cc = db.ccs.find(c => c.id === ccId); if (!cc) return;
  cargarJsPDF(() => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('portrait', 'mm', 'a4');
    const W = doc.internal.pageSize.width;
    const margin = 14;
    let y = 14;

    function addSection(num, title) {
      if (y > 255) { doc.addPage(); y = 14; }
      y += 4;
      doc.setFillColor(30,25,22);
      doc.rect(margin, y-4, W-margin*2, 8, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255);
      doc.text(num + '  ' + title, margin+3, y+1);
      y += 10; doc.setTextColor(30,25,22);
    }
    function addLabel(label, value) {
      if (y > 270) { doc.addPage(); y = 14; }
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(100);
      doc.text(label, margin, y);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(30,25,22);
      doc.text(String(value||'—'), margin+55, y);
      y += 6;
    }
    function addParagraph(text) {
      if (!text) { y += 3; return; }
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(30,25,22);
      const lines = doc.splitTextToSize(String(text), W-margin*2);
      if (y + lines.length*4 > 275) { doc.addPage(); y = 14; }
      doc.text(lines, margin, y);
      y += lines.length*4 + 2;
    }

    // HEADER
    doc.setFillColor(200,65,10);
    doc.rect(0, 0, W, 3, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(200,65,10);
    doc.text(cc.numero, margin, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(100);
    doc.text('REG-SOP-DOC-005-A', W-margin, y, { align:'right' });
    y += 6;
    doc.setFontSize(9);
    doc.text('Estado: ' + cc.estado + (cc.criticidad ? '  |  Criticidad: ' + cc.criticidad : '') + (cc.prioridad ? '  |  Prioridad: ' + cc.prioridad : ''), margin, y);
    y += 4;
    doc.setDrawColor(200); doc.line(margin, y, W-margin, y); y += 6;

    addSection('01','CARÁTULA');
    addLabel('Título:', cc.titulo); addLabel('Departamento:', cc.departamento);
    addLabel('Fecha:', cc.fechaSolicitud); addLabel('Aspecto a modificar:', cc.aspecto);
    addLabel('Tipo de cambio:', cc.tipoCambio); addLabel('Naturaleza:', cc.naturaleza);
    addLabel('Criticidad:', cc.criticidad); addLabel('Prioridad:', cc.prioridad);

    addSection('02','DETALLES DEL CAMBIO');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(30,25,22);
    doc.text('Descripción:', margin, y); y += 4;
    addParagraph(cc.descripcion);
    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text('Justificación:', margin, y); y += 4;
    addParagraph(cc.justificacion);

    if (cc.impactoAreas && Object.keys(cc.impactoAreas).length > 0) {
      const rows = Object.entries(cc.impactoAreas).filter(([,v]) => v).map(([k,v]) => [k,v]);
      if (rows.length > 0) {
        doc.autoTable({ head:[['Área','Impacto']], body:rows, startY:y, margin:{left:margin,right:margin}, styles:{fontSize:7,cellPadding:2}, headStyles:{fillColor:[80,75,70],fontSize:7} });
        y = doc.lastAutoTable.finalY + 4;
      }
    }

    addSection('03','REUNIÓN Y EVALUACIÓN');
    if ((cc.asistentes||[]).length > 0) {
      const rows = cc.asistentes.map(a => [a.nombre, a.sector||'']);
      doc.autoTable({ head:[['Asistente','Sector']], body:rows, startY:y, margin:{left:margin,right:margin}, styles:{fontSize:7,cellPadding:2}, headStyles:{fillColor:[80,75,70],fontSize:7} });
      y = doc.lastAutoTable.finalY + 4;
    }
    addLabel('Plan contingencia:', ''); addParagraph(cc.planContingencia);
    addLabel('Período:', (cc.periodoDesde||'—') + ' → ' + (cc.periodoHasta||'—'));
    addLabel('Decisión:', cc.decisionReunion);

    if ((cc.responsables||[]).length > 0) {
      const rows = cc.responsables.map(r => [r.nombre||'', r.tarea||'', r.plazo||'—', r.cumplida||'—']);
      doc.autoTable({ head:[['Responsable','Tarea','Plazo','Cumplida']], body:rows, startY:y, margin:{left:margin,right:margin}, styles:{fontSize:7,cellPadding:2}, headStyles:{fillColor:[80,75,70],fontSize:7} });
      y = doc.lastAutoTable.finalY + 4;
    }

    addSection('06','IMPLEMENTACIÓN');
    addLabel('Fue exitosa:', cc.implExitosa); addLabel('Plan contingencia:', cc.implContingencia);
    addLabel('Notif. Dir. Técnica:', cc.implNotifDT); addLabel('Fecha:', cc.fechaImplementacion);
    addParagraph(cc.obsImplementacion);

    addSection('07','VERIFICACIÓN');
    addLabel('Fue exitosa:', cc.verifExitosa); addLabel('Verificado por:', cc.verificadoPor);
    addLabel('Fecha:', cc.fechaVerificacion);
    addParagraph(cc.obsVerificacion);

    addSection('08','CIERRE');
    addLabel('Responsable cierre:', cc.responsableCierre); addLabel('Fecha cierre:', cc.fechaCierre);
    addParagraph(cc.obsCierre);

    // FOOTER
    const pageCount = doc.internal.getNumberOfPages();
    for (let i = 1; i <= pageCount; i++) {
      doc.setPage(i);
      doc.setFontSize(7); doc.setTextColor(150);
      doc.text('REG-SOP-DOC-005-A  |  ' + cc.numero + '  |  Página ' + i + ' de ' + pageCount, W-margin, doc.internal.pageSize.height-8, { align:'right' });
    }

    const filename = cc.numero.replace(/[\s\/]/g,'_') + '.pdf';
    doc.save(filename);
    showToast('PDF descargado: ' + filename);
  });
}

function cargarJsPDF(cb) {
  if (typeof window.jspdf !== 'undefined' && typeof window.jspdf.jsPDF !== 'undefined') { cb(); return; }
  showToast('Cargando librería PDF...');
  const s1 = document.createElement('script');
  s1.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js';
  s1.onload = function() {
    const s2 = document.createElement('script');
    s2.src = 'https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js';
    s2.onload = cb;
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

// ==================== TOAST ====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

cargarDatos();
